<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .clock { font-size: 2em; margin: 20px; }
    </style>
</head>
<body>
    <div class="clock" id="clock"></div>
    <script>
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const utcTime = now.toLocaleString('en-US', options);

            options.timeZone = 'America/New_York';
            const nyTime = now.toLocaleString('en-US', options);

            options.timeZone = 'Europe/London';
            const londonTime = now.toLocaleString('en-US', options);

            document.getElementById('clock').innerHTML = \
                `<p>UTC Time: ${utcTime}</p>\n                <p>New York Time: ${nyTime}</p>\n                <p>London Time: ${londonTime}</p>`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
