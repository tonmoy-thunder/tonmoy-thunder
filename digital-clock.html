<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        .clock {\n            margin: 20px;\n            text-align: center;\n        }\n        .timezone {\n            font-size: 1.2em;\n        }\n    </style>\n</head>\n<body>\n    <div id="clocks">\n        <div class="clock" id="utc">\n            <div class="timezone">UTC</div>\n            <div class="time">00:00:00</div>\n        </div>\n        <div class="clock" id="est">\n            <div class="timezone">EST</div>\n            <div class="time">00:00:00</div>\n        </div>\n        <div class="clock" id="ist">\n            <div class="timezone">IST</div>\n            <div class="time">00:00:00</div>\n        </div>\n    </div>\n    <script>\n        function updateClocks() {\n            const utcTime = new Date();\n            document.getElementById('utc').querySelector('.time').innerText = utcTime.toUTCString().slice(17, 25);\n            const estTime = new Date(utcTime.toLocaleString('en-US', { timeZone: 'America/New_York' }));\n            document.getElementById('est').querySelector('.time').innerText = estTime.toTimeString().slice(0, 8);\n            const istTime = new Date(utcTime.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));\n            document.getElementById('ist').querySelector('.time').innerText = istTime.toTimeString().slice(0, 8);\n        }\n        setInterval(updateClocks, 1000);\n        updateClocks(); // initial call to set the time right away\n    </script>\n</body>\n</html>
